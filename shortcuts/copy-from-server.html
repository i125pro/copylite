<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000">
<title>复制</title>
<style>
*{margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden;-webkit-tap-highlight-color:transparent}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.2rem;font-family:-apple-system,sans-serif;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="toast"></div>
<script>
const S='http://192.168.0.24:8086';

function toast(m,c){
  const t=document.getElementById('toast');
  t.textContent=m;
  if(c)t.style.color=c;
  t.classList.add('show');
}

async function run(){
  try{
    const r=await fetch(S+'/api/clipboard',{cache:'no-store'});
    const d=await r.json();
    const text=d.content||'';
    if(!text){toast('服务器剪贴板为空','#888');return}

    let ok=false;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      try{await navigator.clipboard.writeText(text);ok=true}catch(e){}
    }
    if(!ok){
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0,99999);
      try{document.execCommand('copy');ok=true}catch(e){}
      document.body.removeChild(ta);
    }
    toast(ok?'已复制':'复制失败，请长按选择','#fff');
  }catch(e){
    toast('连接失败','#f66');
  }
}

run();
</script>
</body>
</html>
